<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP-Tidy Web</title>
    <style>
        :root {
            --primary-color: #3b82f6; --primary-hover: #2563eb;
            --success-color: #10b981; --warning-color: #f59e0b; --error-color: #ef4444;
            --bg-color: #f3f4f6; --card-bg: #ffffff; --text-main: #1f2937;
            --text-secondary: #6b7280; --border-color: #e5e7eb;
            --radius: 8px; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color); color: var(--text-main); padding: 15px; line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 1200px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: var(--shadow); }
        h1 { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 13px; margin-bottom: 18px; }
        .status-bar {
            margin-bottom: 18px; padding: 12px 16px; background: #ecfdf5;
            border-left: 4px solid var(--success-color); color: #065f46;
            border-radius: 4px; font-size: 14px; display: flex; align-items: center; gap: 8px;
        }
        .controls {
            background: #f8fafc; border: 1px solid var(--border-color); padding: 18px;
            border-radius: var(--radius); margin-bottom: 18px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px; align-items: end;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
        .form-group-full { grid-column: 1 / -1; }
        select, input, textarea {
            padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;
            font-size: 14px; background: #fff; outline: none; width: 100%;
            font-family: inherit; transition: border-color 0.2s;
        }
        select:focus, input:focus, textarea:focus { border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
        textarea { min-height: 120px; resize: vertical; font-family: 'Menlo','Monaco',monospace; font-size: 12px; }
        .checks { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; padding-top: 2px; }
        .checks label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-main); cursor: pointer; white-space: nowrap; }
        .checks input[type=checkbox] { width: auto; accent-color: var(--primary-color); }

        button#btnStart {
            grid-column: 1 / -1; background: var(--primary-color); color: #fff;
            padding: 12px; font-size: 16px; font-weight: 600; border: none;
            border-radius: 6px; cursor: pointer; transition: all 0.2s; margin-top: 4px;
        }
        button#btnStart:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { background: #9ca3af !important; cursor: not-allowed; transform: none !important; }

        .progress-container {
            width: 100%; background: #e5e7eb; border-radius: 10px; margin: 18px 0;
            height: 20px; overflow: hidden; display: none;
        }
        .progress-bar {
            height: 100%; width: 0; text-align: center; line-height: 20px;
            color: #fff; font-size: 11px; transition: width 0.3s;
            background: linear-gradient(45deg, var(--primary-color) 25%, #60a5fa 25%, #60a5fa 50%, var(--primary-color) 50%, var(--primary-color) 75%, #60a5fa 75%, #60a5fa);
            background-size: 20px 20px; animation: stripe 1s linear infinite;
        }
        @keyframes stripe { 0% { background-position: 0 0; } 100% { background-position: 20px 20px; } }

        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 18px; overflow-x: auto; }
        .tab { padding: 12px 24px; cursor: pointer; color: var(--text-secondary); font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.3s; white-space: nowrap; }
        .tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

        .section-box { background: #fff; border: 1px solid var(--border-color); border-radius: var(--radius); padding: 15px; margin-bottom: 18px; }
        .section-box h3 { margin: 0 0 15px 0; font-size: 16px; display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
        .badge { background: var(--primary-color); color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 400; }

        .scroll-table, .scroll-table-lg { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--border-color); border-radius: 6px; }
        .scroll-table { max-height: 300px; overflow-y: auto; }
        .scroll-table-lg { max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; font-size: 14px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background: #f9fafb; font-weight: 600; color: var(--text-secondary); position: sticky; top: 0; z-index: 1; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f3f4f6; }

        .action-btn { padding: 6px 12px; background: var(--warning-color); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; transition: opacity 0.2s; }
        .action-btn:hover { opacity: 0.9; }
        .action-btn.selected { background: var(--success-color); }
        .action-btn:disabled { background: #d1d5db; color: #9ca3af; }
        .export-btn { padding: 6px 12px; background: var(--success-color); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: auto; }

        .copy-ip { cursor: pointer; border-bottom: 1px dashed #9ca3af; transition: all 0.2s; }
        .copy-ip:hover { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        .copy-ip:active { opacity: 0.7; }

        .log-box {
            height: 200px; overflow-y: auto; background: #1e293b; color: #10b981;
            padding: 15px; border-radius: var(--radius); font-family: 'Menlo','Monaco',monospace;
            font-size: 12px; margin-top: 18px; line-height: 1.4;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .test-status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .test-status.testing { background: #fef3c7; color: #d97706; }
        .test-status.done { background: #d1fae5; color: #059669; }
        .lat-color { font-weight: 600; }

        @media (max-width: 768px) {
            body { padding: 10px; } .container { padding: 15px; border-radius: 8px; }
            h1 { font-size: 1.25rem; } .controls { grid-template-columns: 1fr 1fr; padding: 14px; }
            th, td { padding: 10px; font-size: 13px; }
        }
        @media (max-width: 480px) { .controls { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>IP-Tidy Web</h1>
    <p class="subtitle">ASN / CIDR -> cf-scanner TLS -> API 精筛 -> 证书反查 -> 测速 -> CSV</p>
    <div class="status-bar" id="status">正在连接服务器...</div>
    <div class="status-bar" id="serverInfo" style="display:none;background:#f0f9ff;border-left-color:#3b82f6;color:#1e40af;font-size:12px"></div>

    <div class="controls" id="controlsBox">
        <div class="form-group">
            <label>扫描模式</label>
            <select id="scanMode" onchange="onModeChange()">
                <option value="asn_cidr">ASN/CIDR 扫描</option>
                <option value="custom">自定义扫描</option>
            </select>
        </div>

        <div class="form-group" id="gIpMode">
            <label>IP 协议族</label>
            <select id="ipMode">
                <option value="all">全部</option>
                <option value="v4">仅 IPv4</option>
                <option value="v6">仅 IPv6</option>
            </select>
        </div>

        <div class="form-group">
            <label>端口模式</label>
            <select id="portMode" onchange="onPortModeChange()">
                    <option value="default">默认端口 (443,8443,2053,2083,2087,2096)</option>
                    <option value="wide">宽端口 (55546个)</option>
                    <option value="random">随机端口 (加权取5个)</option>
                    <option value="custom">自定义端口</option>
            </select>
        </div>

        <div class="form-group" id="gCustomPorts" style="display:none">
            <label>自定义端口 (逗号分隔)</label>
            <input type="text" id="customPorts" value="443,8443,2053,2083,2087,2096" placeholder="443,8443,2053-2096">
        </div>

        <div class="form-group">
            <label>并发数</label>
            <input type="number" id="scanThreads" value="100" min="10" max="500" placeholder="100">
        </div>

        <div class="form-group">
            <label>延迟阈值 (ms)</label>
            <input type="number" id="testDelay" value="500" min="50" max="5000" placeholder="500">
        </div>

        <!-- ASN/CIDR 模式 -->
        <div class="form-group form-group-full" id="gAsnCidr">
            <label>ASN / CIDR (逗号分隔，例: AS209242,AS13335 或 1.2.3.0/24)</label>
            <input type="text" id="asnCidrInput" placeholder="AS209242 或 1.2.3.0/24,2001:db8::/32">
        </div>

        <!-- 自定义模式 -->
        <div class="form-group form-group-full" id="gCustomIps" style="display:none">
            <label>IP 列表 (每行: IP [端口]，不指定端口扫描所有端口模式下的端口)</label>
            <textarea id="customIps" placeholder="1.2.3.4 443
5.6.7.8 8443
1.1.1.1
2606:4700::1111 443"></textarea>
        </div>

        <div class="form-group form-group-full">
            <div class="checks">
                <label><input type="checkbox" id="chkSpeed"> 扫描后自动测速</label>
                <label><input type="checkbox" id="chkCert"> 证书反查 (crt.sh)</label>
                <label><input type="checkbox" id="chkSmart"> 智能子网分级 (大CIDR拆/24探活)</label>
            </div>
        </div>

        <button id="btnStart" onclick="startTask()">开始扫描与测试</button>
    </div>

    <div class="progress-container" id="progressBox">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('scan')">扫描结果</div>
        <div class="tab" onclick="switchTab('test')">详细测试</div>
    </div>

    <div id="scan" class="tab-content active">
        <div class="section-box" id="dcSection" style="display:none">
            <h3>数据中心汇总 <span class="badge" id="dcCount">0</span></h3>
            <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">点击选择测试筛选对应数据中心节点</p>
            <div class="scroll-table">
                <table id="dcTable">
                    <thead><tr><th>数据中心</th><th>地区</th><th>IP数量</th><th>最低延迟</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="section-box">
            <h3>扫描结果 <span class="badge" id="scanCount">0</span>
                <button class="export-btn" onclick="exportCSV()">导出 CSV</button>
                <button class="export-btn" id="btnExportCidrs" onclick="exportCidrs()" style="display:none;background:#6366f1">导出 CIDR 列表</button>
            </h3>
            <div class="scroll-table-lg">
                <table id="scanTable">
                    <thead><tr><th>IP地址 (点击复制)</th><th>端口</th><th>数据中心</th><th>地区</th><th>ASN</th><th>延迟</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="test" class="tab-content">
        <div class="section-box">
            <h3>详细测试结果 <span class="badge" id="testCount">0</span></h3>
            <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">点击测速按钮对单个IP进行下载速度测试，点击IP可复制</p>
            <div class="scroll-table-lg">
                <table id="testTable">
                    <thead><tr><th>IP地址</th><th>端口</th><th>数据中心</th><th>地区</th><th>延迟</th><th>测速</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="log-box" id="logBox"><div>[系统] 等待操作...</div></div>
</div>

<script>
var sid='',es=null,scanData=[],dcList=[],testedDCs=new Set(),curDC='';

function S(){if(!sid)sid=(crypto.randomUUID?crypto.randomUUID():Math.random().toString(36)).replace(/-/g,'').slice(0,12);return sid}

function CE(){
    fetch('/api/server-info').then(function(r){return r.json()}).then(function(i){
        document.getElementById('serverInfo').style.display='';
        document.getElementById('serverInfo').innerHTML='服务器 -- CPU: '+i.cpu+'核 | 内存: '+i.memory_mb+'MB | cf-scanner: '+(i.cf_scanner?'已加载':'缺失')+' | GeoIP: '+(i.geoip?'可用':'不可用');
    }).catch(function(){});
    if(es)es.close();
    es=new EventSource('/api/events?session='+S());
    es.onopen=function(){US('已连接服务器',true);L('已连接到服务器')};
    es.onerror=function(){US('连接断开，3秒后重连...',false);L('连接断开，重连中...');setTimeout(CE,3000)};
    es.onmessage=function(e){try{var m=JSON.parse(e.data);HM(m)}catch(_){}}
}

function HM(m){
    switch(m.type){
        case 'log':L(m.data);break;
        case 'scan_progress':UP(m.data.current,m.data.total,(m.data.stage||'扫描中'));break;
        case 'scan_result':scanData.push(m.data);UB('scanCount',scanData.length);RSR(m.data);break;
        case 'scan_complete':SR();SDC(m.data);
            if(m.data.total===0)document.getElementById('btnExportCidrs').style.display='';
            else document.getElementById('btnExportCidrs').style.display='none';
            break;
        case 'speed_result':USR(m.data);break;
        case 'task_complete':L('任务全部完成');RB('开始扫描与测试');var pb=document.getElementById('progressBar');pb.style.width='100%';pb.textContent='完成';break;
        case 'error':L('错误: '+m.data);RB('开始扫描与测试');var pb=document.getElementById('progressBar');pb.style.background='#ef4444';pb.style.width='100%';pb.textContent='任务失败';break;
    }
}

function RB(t){var b=document.getElementById('btnStart');b.disabled=false;b.textContent=t}
function UB(id,v){document.getElementById(id).textContent=v}
function US(t,c){var e=document.getElementById('status');e.textContent=t;if(c){e.style.borderLeftColor='var(--success-color)';e.style.background='#ecfdf5';e.style.color='#065f46'}else{e.style.borderLeftColor='#ef4444';e.style.background='#fef2f2';e.style.color='#991b1b'}}
function L(t){var b=document.getElementById('logBox');var ts=new Date().toLocaleTimeString();b.innerHTML+='<div><span style="opacity:0.6">['+ts+']</span> '+t+'</div>';b.scrollTop=b.scrollHeight}
function UP(c,t,s){var b=document.getElementById('progressBar');var p=Math.round(c/t*100)+'%';b.style.width=p;b.textContent=s+' '+p}

function onModeChange(){
    var m=document.getElementById('scanMode').value;
    document.getElementById('gIpMode').style.display=m==='asn_cidr'?'':'none';
    document.getElementById('gAsnCidr').style.display=m==='asn_cidr'?'':'none';
    document.getElementById('gCustomIps').style.display=m==='custom'?'':'none';
    document.getElementById('chkSmart').parentElement.style.display=m==='asn_cidr'?'':'none';
}

function onPortModeChange(){
    var m=document.getElementById('portMode').value;
    document.getElementById('gCustomPorts').style.display=m==='custom'?'':'none';
}

function startTask(){
    var m=document.getElementById('scanMode').value;
    var b=document.getElementById('btnStart');b.disabled=true;b.textContent='扫描进行中...';

    document.querySelector('#scanTable tbody').innerHTML='';
    document.querySelector('#testTable tbody').innerHTML='';
    document.querySelector('#dcTable tbody').innerHTML='';
    document.getElementById('dcSection').style.display='none';
    document.getElementById('progressBar').style.background='';
    scanData=[];dcList=[];testedDCs.clear();curDC='';
    UB('scanCount',0);UB('testCount',0);UB('dcCount',0);
    switchTab('scan');
    document.getElementById('progressBox').style.display='block';
    UP(0,100,'准备中');

    var p={
        session:S(), mode:m,
        port_mode: document.getElementById('portMode').value,
        custom_ports: document.getElementById('customPorts').value,
        threads: parseInt(document.getElementById('scanThreads').value)||100,
        delay: parseInt(document.getElementById('testDelay').value)||500,
        speed: document.getElementById('chkSpeed').checked,
        cert: document.getElementById('chkCert').checked,
        smart: document.getElementById('chkSmart').checked,
    };

    if(m==='asn_cidr'){
        p.ip_mode=document.getElementById('ipMode').value;
        var input=document.getElementById('asnCidrInput').value.trim();
        var asns=[], cidrs=[];
        input.replace('，',',').split(',').forEach(function(s){s=s.trim();if(!s)return;if(s.indexOf('/')>=0)cidrs.push(s);else{var a=s.replace(/^AS/i,'');if(/^\d+$/.test(a))asns.push(a)}});
        p.asns=asns.join(','); p.cidrs=cidrs.join(',');
    }else{
        p.ips=document.getElementById('customIps').value;
    }

    fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
}

function SDC(data){dcList=data.dc_list||[];RDC();document.getElementById('dcSection').style.display='block';RB('重新开始扫描');document.getElementById('progressBar').textContent='扫描完成，请选择数据中心';L('扫描完成，已按延迟排序')}
function RDC(){
    var tb=document.querySelector('#dcTable tbody');tb.innerHTML='';
    dcList.forEach(function(d){
        var test=testedDCs.has(d.datacenter), testing=curDC===d.datacenter;
        var btn=testing?'<button class="action-btn" disabled>测试中...</button>':(test?'<button class="action-btn selected" onclick="SD(\''+d.datacenter+'\')">重新测试</button>':'<button class="action-btn" onclick="SD(\''+d.datacenter+'\')">选择测试</button>');
        tb.insertAdjacentHTML('beforeend','<tr><td><strong>'+d.datacenter+'</strong></td><td>'+(d.country||d.city||'-')+'</td><td>'+d.ip_count+'</td><td>'+(d.min_latency>0?d.min_latency+' ms':'-')+'</td><td>'+btn+'</td></tr>');
    });
    UB('dcCount',dcList.length);
}

function SD(dc){
    document.querySelector('#testTable tbody').innerHTML='';UB('testCount',0);
    curDC=dc;RDC();switchTab('test');
    scanData.filter(function(r){return r.colo===dc}).forEach(function(r){RTR(r)});
    UB('testCount',scanData.filter(function(r){return r.colo===dc}).length);
    testedDCs.add(dc);curDC='';RDC();
    L('数据中心 '+dc+' 节点: '+scanData.filter(function(r){return r.colo===dc}).length+' 个');
}

function RSR(r){
    var tr=document.querySelector('#scanTable tbody');
    if(tr.children.length>500)tr.removeChild(tr.firstChild);
    var lat=r.latency_str||(r.latency?r.latency+'ms':'N/A');
    var lc=r.latency<100?'#10b981':r.latency<200?'#f59e0b':r.latency>0?'#ef4444':'inherit';
    tr.insertAdjacentHTML('beforeend','<tr><td><span class="copy-ip" onclick="CPI(\''+r.ip+'\',this)" title="点击复制">'+r.ip+'</span></td><td>'+(r.port||'-')+'</td><td>'+(r.colo||'-')+'</td><td>'+(r.region||r.country||'-')+'</td><td>AS'+(r.asn||'-')+'</td><td class="lat-color" style="color:'+lc+'">'+lat+'</td></tr>');
}

function SR(){
    scanData.sort(function(a,b){return(a.latency||9999)-(b.latency||9999)});
    var tb=document.querySelector('#scanTable tbody');tb.innerHTML='';
    scanData.forEach(function(r){RSR(r)});
}

function RTR(r){
    var ipId=r.ip.replace(/[.:]/g,'_');
    var lat=r.latency_str||(r.latency?r.latency+'ms':'N/A');
    var lc=r.latency<100?'#10b981':r.latency<200?'#f59e0b':r.latency>0?'#ef4444':'inherit';
    document.querySelector('#testTable tbody').insertAdjacentHTML('beforeend','<tr><td><span class="copy-ip" onclick="CPI(\''+r.ip+'\',this)" title="点击复制" style="font-weight:500">'+r.ip+'</span></td><td>'+(r.port||'-')+'</td><td>'+(r.colo||'-')+'</td><td>'+(r.region||r.country||'-')+'</td><td class="lat-color" style="color:'+lc+'">'+lat+'</td><td id="sc-'+ipId+'"><button class="action-btn" id="bs-'+ipId+'" onclick="RST(\''+r.ip+'\','+(r.port||443)+')">测速</button></td></tr>');
}

function CPI(ip,el){navigator.clipboard.writeText(ip).then(function(){var o=el.textContent;el.textContent='已复制!';el.style.color='var(--success-color)';setTimeout(function(){el.textContent=o;el.style.color=''},1000)})}

function RST(ip,port){
    var ipId=ip.replace(/[.:]/g,'_'),b=document.getElementById('bs-'+ipId);
    if(b){b.innerHTML='测速中...';b.disabled=true;b.style.background='#4b5563';b.style.color='#fff'}
    fetch('/api/speed-test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip:ip,port:port,session:S()})})
}

function USR(d){
    var ipId=d.ip.replace(/[.:]/g,'_'),c=document.getElementById('sc-'+ipId);
    if(c){var cl='#1f2937';if(d.speed.indexOf('MB/s')>=0){var v=parseFloat(d.speed);if(v>10)cl='#10b981';else if(v>5)cl='#f59e0b'}c.innerHTML='<strong style="color:'+cl+'">'+d.speed+'</strong>'}
}

function switchTab(id){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
    document.querySelectorAll('.tab')[id==='scan'?0:1].classList.add('active');
    document.getElementById(id).classList.add('active');
}

function exportCSV(){
    if(!scanData.length)return alert('无结果');
    fetch('/api/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session:S()})}).then(function(r){return r.blob()}).then(function(b){var u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='ip-tidy-results.csv';a.click();URL.revokeObjectURL(u)})
}

function exportCidrs(){
    fetch('/api/export-cidrs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session:S()})}).then(function(r){if(!r.ok)return alert('无 CIDR 数据');return r.blob()}).then(function(b){if(!b)return;var u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='cidr-list.csv';a.click();URL.revokeObjectURL(u)})
}

CE();
